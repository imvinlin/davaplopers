<div class="min-h-screen bg-neutral-900 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center gap-2 justify-center mb-8">
      <div class="w-9 h-9 bg-yellow-400 rounded-lg flex items-center justify-center text-lg">
        ✈️
      </div>
      <span class="text-white text-xl font-bold">PlanCation</span>
    </div>

    <!-- Card -->
    <div class="bg-neutral-800 rounded-2xl p-8">
      <h1 class="text-white text-2xl font-bold mb-1">Create an account</h1>
      <p class="text-neutral-400 text-sm mb-6">Start planning your next trip</p>

      <!-- Fields -->
      <div class="flex gap-3 mb-3">
        <div class="flex-1">
          <label class="block text-neutral-400 text-xs font-medium mb-1.5">First name</label>
          <input type="text" placeholder="John"
            class="w-full bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-yellow-400" />
        </div>
        <div class="flex-1">
          <label class="block text-neutral-400 text-xs font-medium mb-1.5">Last name</label>
          <input type="text" placeholder="Smith"
            class="w-full bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-yellow-400" />
        </div>
      </div>

      <div class="mb-3">
        <label class="block text-neutral-400 text-xs font-medium mb-1.5">Email</label>
        <input type="email" placeholder="you@email.com"
          class="w-full bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>

      <div class="mb-6">
        <label class="block text-neutral-400 text-xs font-medium mb-1.5">Password</label>
        <input type="password" placeholder="••••••••"
          class="w-full bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-yellow-400" />
      </div>

      <button class="w-full bg-yellow-400 hover:bg-yellow-300 text-neutral-900 font-bold text-sm py-3 rounded-xl transition">
        Create Account
      </button>

      <p class="text-center text-neutral-500 text-sm mt-4">
        Already have an account?
        <a href="/login" class="text-yellow-400 hover:underline">Log in</a>
      </p>
    </div>

  </div>
</div>
