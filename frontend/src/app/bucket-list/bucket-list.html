<div class="min-h-screen flex items-center justify-center px-4 bg-neutral-900">
  <div class="w-full max-w-md bg-neutral-800 rounded-2xl p-6">
    
    <h1 class="text-center text-2xl font-bold text-white mb-4">
      Bucket List!
    </h1>

    <form class="flex gap-2 mb-4">
      <input 
        type="text" 
        placeholder="Search"
        class="flex-1 bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-yellow-400"
      >
      <button 
        type="submit"
        class="bg-yellow-400 hover:bg-yellow-300 text-neutral-900 text-sm font-bold px-4 py-2 rounded-xl transition"
      >
        Filter
      </button>
    </form>

    <div class="overflow-y-auto max-h-96">
      <div *ngFor="let item of bucketList" class="bg-neutral-700 rounded-xl p-3 mb-3 flex items-center gap-3">
        <img [src]="item.image" [alt]="item.name" class="w-16 h-16 rounded-xl object-cover">
        <div>
          <h2 class="text-white text-lg font-semibold">
            {{ item.name }}
          </h2>
          <p class="text-neutral-400 text-sm">
            {{ item.location }} | {{ item.tags }}
          </p>
        </div>
      </div>
    </div>

    <button 
      class="w-full mt-4 bg-yellow-400 hover:bg-yellow-300 text-neutral-900 font-bold text-sm py-3 rounded-xl transition"
    >
      Add New
    </button>

  </div>
</div>
