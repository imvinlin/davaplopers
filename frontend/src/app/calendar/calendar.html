<div class="min-h-screen bg-neutral-900 px-4 py-8">
  <div class="max-w-2xl mx-auto">

    <!-- logo -->
    <div class="flex items-center gap-2 mb-8">
      <div class="w-9 h-9 bg-yellow-400 rounded-lg flex items-center justify-center text-lg">
        ✈️
      </div>
      <span class="text-white text-xl font-bold">PlanCation</span>
    </div>

    <div class="bg-neutral-800 rounded-2xl p-6">

      <!-- month nav -->
      <div class="flex items-center justify-between mb-6">
        <button (click)="prevMonth()"
          class="text-neutral-400 hover:text-white hover:bg-neutral-700 px-3 py-1 rounded-lg transition text-lg">
          ‹
        </button>
        <span class="text-white font-bold text-lg">{{ monthLabel }}</span>
        <button (click)="nextMonth()"
          class="text-neutral-400 hover:text-white hover:bg-neutral-700 px-3 py-1 rounded-lg transition text-lg">
          ›
        </button>
      </div>

      <!-- day-of-week header -->
      <div class="grid grid-cols-7 mb-2">
        <div *ngFor="let d of ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']"
          class="text-center text-neutral-500 text-xs font-medium py-1">
          {{ d }}
        </div>
      </div>

      <!-- day cells -->
      <div class="grid grid-cols-7 gap-1">
        <div *ngFor="let cell of days"
          (click)="selectDay(cell)"
          class="rounded-xl p-2 min-h-16 cursor-pointer transition"
          [class.bg-neutral-700]="cell.inMonth && !isSelected(cell.date)"
          [class.bg-yellow-400]="isSelected(cell.date)"
          [class.bg-neutral-800]="!cell.inMonth && !isSelected(cell.date)"
          [class.ring-2]="isToday(cell.date) && !selectedDate"
          [class.ring-yellow-400]="isToday(cell.date) && !selectedDate">

          <span class="text-xs font-semibold"
            [class.text-neutral-900]="isSelected(cell.date)"
            [class.text-white]="!isSelected(cell.date) && cell.inMonth"
            [class.text-neutral-600]="!isSelected(cell.date) && !cell.inMonth">
            {{ cell.date.getDate() }}
          </span>

          <div *ngFor="let ev of eventsOn(cell.date)"
            class="mt-1 text-xs rounded px-1 py-0.5 truncate"
            [class.bg-neutral-900]="isSelected(cell.date)"
            [class.text-yellow-400]="isSelected(cell.date)"
            [class.bg-yellow-400]="!isSelected(cell.date)"
            [class.text-neutral-900]="!isSelected(cell.date)">
            {{ ev.title }}
          </div>

        </div>
      </div>

      <!-- add event input — shows when a day is selected -->
      <div *ngIf="selectedDate" class="mt-4 flex gap-2">
        <input
          [(ngModel)]="newEventTitle"
          (keydown.enter)="addEvent()"
          placeholder="Add event..."
          class="flex-1 bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-yellow-400" />
        <button
          (click)="addEvent()"
          class="bg-yellow-400 hover:bg-yellow-300 text-neutral-900 font-bold text-sm px-5 py-3 rounded-xl transition">
          Add
        </button>
      </div>

    </div>
  </div>
</div>
