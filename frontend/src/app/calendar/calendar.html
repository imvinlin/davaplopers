<div class="min-h-screen bg-neutral-900 flex flex-col" cdkDropListGroup>

  <!-- Navbar -->
  <div class="bg-neutral-800 px-6 py-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-yellow-400 rounded-lg flex items-center justify-center text-sm">✈️</div>
      <span class="text-white font-bold text-lg">PlanCation</span>
    </div>
    <nav class="flex items-center gap-1">
      <a routerLink="/chat" routerLinkActive="bg-neutral-700 text-white"
        class="text-neutral-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg transition">Chat</a>
      <a routerLink="/bucketlist" routerLinkActive="bg-neutral-700 text-white"
        class="text-neutral-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg transition">Bucket List</a>
      <a routerLink="/calendar" routerLinkActive="bg-neutral-700 text-white"
        class="text-neutral-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg transition">Calendar</a>
    </nav>
  </div>

  <div class="flex-1 px-4 py-4">
  <div class="max-w-7xl mx-auto h-full">
    <!-- main layout -->
    <div class="flex flex-col lg:flex-row gap-6 lg:items-stretch">
      <!-- left sidebar bucket list -->
      <div class="w-full lg:w-[340px] shrink-0 flex lg:self-stretch">
        <div class="w-full flex flex-col">
          <app-bucket-list [showNav]="false" (itemDropped)="dropToBucketList($event)" class="block w-full flex-1"></app-bucket-list>
        </div>
      </div>

      <!-- calendar -->
      <div class="flex-1 w-full bg-neutral-800 rounded-2xl p-6 flex flex-col">
        <!-- month nav -->
        <div class="flex items-center justify-between mb-6">
          <button
            (click)="prevMonth()"
            class="text-neutral-400 hover:text-white hover:bg-neutral-700 px-3 py-1 rounded-lg transition text-lg"
          >
            ‹
          </button>

          <span class="text-white font-bold text-lg">{{ monthLabel }}</span>

          <button
            (click)="nextMonth()"
            class="text-neutral-400 hover:text-white hover:bg-neutral-700 px-3 py-1 rounded-lg transition text-lg"
          >
            ›
          </button>

          <button
            (click)="exportICS()"
            [disabled]="!tripId"
            class="text-xs bg-yellow-400 hover:bg-yellow-300 disabled:opacity-40 text-neutral-900 font-bold px-3 py-1.5 rounded-lg transition"
          >
            ↓ Export .ics
          </button>
        </div>

        <!-- day-of-week header -->
        <div class="grid grid-cols-7 mb-2">
          <div
            *ngFor="let d of ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']"
            class="text-center text-neutral-500 text-xs font-medium py-1"
          >
            {{ d }}
          </div>
        </div>

        <!-- day cells -->
        <div class="grid grid-cols-7 gap-2 flex-1">
          <div
            *ngFor="let cell of days"
            cdkDropList
            [cdkDropListData]="cell"
            [cdkDropListSortingDisabled]="true"
            [cdkDropListEnterPredicate]="allowCalendarDrop"
            (cdkDropListDropped)="dropOnDay($event, cell)"
            (click)="selectDay(cell)"
            class="rounded-xl p-2 min-h-24 cursor-pointer transition overflow-hidden"
            [class.bg-neutral-700]="cell.inMonth && !isSelected(cell.date)"
            [class.bg-yellow-400]="isSelected(cell.date)"
            [class.bg-neutral-800]="!cell.inMonth && !isSelected(cell.date)"
            [class.ring-2]="isToday(cell.date) && !isSelected(cell.date)"
            [class.ring-yellow-400]="isToday(cell.date) && !isSelected(cell.date)"
          >
            <span
              class="text-xs font-semibold"
              [class.text-neutral-900]="isSelected(cell.date)"
              [class.text-white]="!isSelected(cell.date) && cell.inMonth"
              [class.text-neutral-600]="!isSelected(cell.date) && !cell.inMonth"
            >
              {{ cell.date.getDate() }}
            </span>

            <div
              *ngFor="let ev of cell.events"
              cdkDrag
              [cdkDragData]="ev"
              cdkDragPreviewContainer="global"
              class="mt-1 text-xs rounded px-1 py-0.5 truncate cursor-move z-50 relative"
              [class.bg-neutral-900]="isSelected(cell.date)"
              [class.text-yellow-400]="isSelected(cell.date)"
              [class.bg-yellow-400]="!isSelected(cell.date)"
              [class.text-neutral-900]="!isSelected(cell.date)"
            >
              <div *cdkDragPreview class="bucket-card-preview bg-neutral-700 rounded-lg px-3 py-2 flex items-center gap-3 border border-yellow-400 shadow-[0_35px_60px_-15px_rgba(0,0,0,0.8)] z-[99999] pointer-events-none">
                 <img [src]="ev.item.image" class="w-14 h-14 rounded-lg object-cover shrink-0" />
                 <div class="min-w-0 flex-1">
                   <h2 class="text-white text-sm font-semibold truncate">{{ ev.item.name }}</h2>
                   <p class="text-neutral-400 text-[11px] truncate">{{ ev.item.location }}</p>
                 </div>
              </div>
              {{ ev.item.name }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>
</div>
