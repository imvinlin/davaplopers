<div class="min-h-screen bg-neutral-900 flex flex-col">

  <!-- Header -->
  <div class="bg-neutral-800 px-6 py-4 flex items-center gap-2">
    <div class="w-8 h-8 bg-yellow-400 rounded-lg flex items-center justify-center text-sm">
      ✈️
    </div>
    <span class="text-white font-bold text-lg">PlanCation</span>
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
    <div *ngFor="let msg of messages"
      [class]="msg.role === 'user'
        ? 'ml-auto bg-yellow-400 text-neutral-900 rounded-2xl rounded-br-sm px-4 py-2 max-w-lg text-sm'
        : 'mr-auto bg-neutral-700 text-white rounded-2xl rounded-bl-sm px-4 py-2 max-w-lg text-sm whitespace-pre-wrap'">
      {{ msg.text }}
    </div>
    <div *ngIf="loading" class="mr-auto bg-neutral-700 text-neutral-400 rounded-2xl px-4 py-2 text-sm">
      Thinking...
    </div>
  </div>

  <!-- Input -->
  <div class="bg-neutral-800 px-4 py-3">
    <div class="flex gap-2 max-w-3xl mx-auto">
      <input
        [(ngModel)]="input"
        (keydown.enter)="send()"
        placeholder="Plan a trip..."
        class="flex-1 bg-neutral-700 text-white text-sm placeholder-neutral-500 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-yellow-400" />
      <button
        (click)="send()"
        [disabled]="loading"
        class="bg-yellow-400 hover:bg-yellow-300 disabled:opacity-50 text-neutral-900 font-bold text-sm px-5 py-3 rounded-xl transition">
        Send
      </button>
    </div>
  </div>

</div>
